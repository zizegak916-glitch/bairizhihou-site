<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白日之后 - 全方位剖析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: { primary: '#0f0f0f', secondary: '#1a1a1a', card: '#1e1e1e' }
          }
        }
      }
    }
  </script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #444 #1a1a1a; }
    body { background: #0f0f0f; }
    .glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.15); }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
    .heatmap-cell { transition: background 0.2s; }
    .heatmap-cell:hover { outline: 2px solid #fff; }
    .timeline-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #6366f1, #8b5cf6, #a855f7); }
    @media (max-width: 768px) { .timeline-line { left: 20px; } }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .stat-number { background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .gradient-border { border: 1px solid transparent; background-clip: padding-box; position: relative; }
    .gradient-border::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; pointer-events: none; }
  </style>
</head>
<body class="text-gray-200 min-h-screen">

  <!-- Hero -->
  <section id="hero" class="relative flex items-center justify-center min-h-[80vh] overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-900/20 via-purple-900/10 to-black"></div>
    <div class="absolute top-20 left-20 w-72 h-72 bg-indigo-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
    <div class="relative z-10 text-center px-6 fade-in">
      <h1 class="text-6xl md:text-8xl font-bold mb-6 bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">白日之后</h1>
      <p class="text-xl md:text-2xl text-gray-400 mb-10 tracking-widest">全方位剖析</p>
      <div class="flex flex-wrap justify-center gap-8" id="stats-bar">
        <div class="text-center"><div class="stat-number text-4xl font-bold" id="stat-chars">-</div><div class="text-gray-500 text-sm mt-1">总字数</div></div>
        <div class="text-center"><div class="stat-number text-4xl font-bold" id="stat-chapters">-</div><div class="text-gray-500 text-sm mt-1">章节数</div></div>
        <div class="text-center"><div class="stat-number text-4xl font-bold" id="stat-characters">-</div><div class="text-gray-500 text-sm mt-1">人物数</div></div>
        <div class="text-center"><div class="stat-number text-4xl font-bold" id="stat-world">-</div><div class="text-gray-500 text-sm mt-1">世界设定</div></div>
      </div>
    </div>
  </section>

  <!-- 人物卡片 -->
  <section class="max-w-7xl mx-auto px-6 py-20" id="section-characters">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">人物图鉴</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="character-grid"></div>
  </section>

  <!-- 字数统计图 -->
  <section class="max-w-7xl mx-auto px-6 py-20" id="section-words">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">章节字数统计</h2>
    <div class="bg-bg-card rounded-2xl p-6 gradient-border">
      <canvas id="wordChart" height="300"></canvas>
    </div>
  </section>

  <!-- 关系图 -->
  <section class="max-w-7xl mx-auto px-6 py-20" id="section-relations">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">人物关系</h2>
    <div class="bg-bg-card rounded-2xl p-6 gradient-border relative" style="height: 500px;">
      <canvas id="relationCanvas"></canvas>
    </div>
  </section>

  <!-- 热力图 -->
  <section class="max-w-7xl mx-auto px-6 py-20" id="section-heatmap">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">人物出场热力图</h2>
    <div class="bg-bg-card rounded-2xl p-6 gradient-border overflow-x-auto">
      <div id="heatmap-container"></div>
    </div>
  </section>

  <!-- 时间线 -->
  <section class="max-w-5xl mx-auto px-6 py-20" id="section-timeline">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">关键情节时间线</h2>
    <div class="relative" id="timeline-container"></div>
  </section>

  <!-- 世界设定 -->
  <section class="max-w-7xl mx-auto px-6 py-20" id="section-world">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">世界设定</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="world-grid"></div>
  </section>

  <!-- Footer -->
  <footer class="text-center py-10 text-gray-600 text-sm border-t border-gray-800">白日之后 - 数据分析</footer>

<script>
let DATA = null;

const TYPE_COLORS = {
  turning: '#f59e0b',
  discovery: '#3b82f6',
  character: '#10b981',
  crisis: '#ef4444'
};

const TYPE_LABELS = {
  turning: '转折',
  discovery: '发现',
  character: '人物',
  crisis: '危机'
};

async function loadData() {
  const res = await fetch('data/content.json');
  DATA = await res.json();
  render();
}

function render() {
  renderStats();
  renderCharacters();
  renderWordChart();
  renderRelationGraph();
  renderHeatmap();
  renderTimeline();
  renderWorldSettings();
}

function renderStats() {
  document.getElementById('stat-chars').textContent = DATA.stats.totalChars.toLocaleString();
  document.getElementById('stat-chapters').textContent = DATA.stats.totalChapters;
  document.getElementById('stat-characters').textContent = DATA.stats.totalCharacters;
  document.getElementById('stat-world').textContent = DATA.stats.totalWorldSettings;
}

function renderCharacters() {
  const grid = document.getElementById('character-grid');
  grid.innerHTML = DATA.characters.map(c => {
    const chCount = c.chapters.length;
    const avgChars = Math.round(chCount * DATA.stats.totalChars / DATA.stats.totalChapters);
    return `
      <div class="bg-bg-card rounded-xl p-5 gradient-border card-hover cursor-default" style="--accent: ${c.color}">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-lg" style="background: ${c.color}">${c.name[0]}</div>
          <div>
            <div class="font-bold text-white">${c.name}</div>
            <div class="text-xs text-gray-500">${c.role}</div>
          </div>
        </div>
        <p class="text-gray-400 text-sm mb-3 leading-relaxed">${c.desc}</p>
        <div class="flex items-center gap-2 text-xs text-gray-600">
          <span>出场 <span class="text-gray-300 font-medium">${chCount}</span> 章</span>
          <span>·</span>
          <span>约 <span class="text-gray-300 font-medium">${avgChars.toLocaleString()}</span> 字</span>
        </div>
        <div class="flex flex-wrap gap-1 mt-3">
          ${c.chapters.map(ch => `<span class="w-5 h-5 rounded text-[10px] flex items-center justify-center" style="background: ${c.color}22; color: ${c.color}">${ch}</span>`).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderWordChart() {
  const ctx = document.getElementById('wordChart').getContext('2d');
  const labels = DATA.chapters.map((ch, i) => `第${i}章 ${ch.name}`);
  const values = DATA.chapters.map(ch => ch.chars);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '字数',
        data: values,
        backgroundColor: values.map((v, i) => {
          const max = Math.max(...values);
          const ratio = v / max;
          return `rgba(99, 102, 241, ${0.3 + ratio * 0.7})`;
        }),
        borderColor: 'rgba(99, 102, 241, 0.8)',
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: (items) => {
              const idx = items[0].dataIndex;
              return `第${idx}章 ${DATA.chapters[idx].name}`;
            },
            label: (item) => `${item.raw.toLocaleString()} 字`
          }
        }
      },
      scales: {
        x: { ticks: { color: '#666', maxRotation: 45 }, grid: { color: '#222' } },
        y: { ticks: { color: '#666' }, grid: { color: '#222' } }
      }
    }
  });
}

function renderRelationGraph() {
  const canvas = document.getElementById('relationCanvas');
  const container = canvas.parentElement;
  const W = container.clientWidth;
  const H = container.clientHeight;
  canvas.width = W * 2;
  canvas.height = H * 2;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(2, 2);

  const chars = DATA.characters;
  const cx = W / 2, cy = H / 2;
  const radius = Math.min(W, H) * 0.35;

  const positions = {};
  chars.forEach((c, i) => {
    const angle = (i / chars.length) * Math.PI * 2 - Math.PI / 2;
    positions[c.name] = { x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius, color: c.color };
  });

  DATA.relationships.forEach(r => {
    const a = positions[r.from];
    const b = positions[r.to];
    if (!a || !b) return;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = `rgba(255,255,255,${0.05 + r.strength * 0.08})`;
    ctx.lineWidth = 0.5 + r.strength * 0.5;
    ctx.stroke();

    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(r.label, mx, my - 4);
  });

  chars.forEach(c => {
    const p = positions[c.name];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 22, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.name, p.x, p.y);

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '10px sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText(c.role, p.x, p.y + 28);
  });
}

function renderHeatmap() {
  const container = document.getElementById('heatmap-container');
  const chars = DATA.characters;
  const numChapters = DATA.chapters.length;

  let html = '<div class="min-w-[700px]">';
  html += '<div class="flex mb-2 pl-32">';
  for (let i = 0; i < numChapters; i++) {
    html += `<div class="w-8 text-center text-[10px] text-gray-500 flex-shrink-0">${i}</div>`;
  }
  html += '</div>';

  chars.forEach(c => {
    const chSet = new Set(c.chapters);
    html += `<div class="flex items-center mb-1">`;
    html += `<div class="w-32 text-right pr-3 text-sm text-gray-400 flex-shrink-0 truncate">${c.name}</div>`;
    for (let i = 0; i < numChapters; i++) {
      const has = chSet.has(i);
      const bg = has ? c.color + 'cc' : '#1a1a1a';
      html += `<div class="w-8 h-6 heatmap-cell rounded-sm flex-shrink-0" style="background:${bg}" title="${c.name} - 第${i}章 ${DATA.chapters[i].name}"></div>`;
    }
    html += '</div>';
  });

  html += '<div class="flex mt-3 pl-32 items-center gap-2 text-xs text-gray-500">';
  html += '<span>图例：</span>';
  html += '<div class="w-4 h-4 rounded" style="background:#1a1a1a;border:1px solid #333"></div><span>未出场</span>';
  html += '<div class="w-4 h-4 rounded" style="background:#6366f1cc"></div><span>出场</span>';
  html += '</div>';
  html += '</div>';
  container.innerHTML = html;
}

function renderTimeline() {
  const container = document.getElementById('timeline-container');
  container.innerHTML = '<div class="timeline-line"></div>';

  DATA.plotPoints.forEach((p, i) => {
    const isLeft = i % 2 === 0;
    const color = TYPE_COLORS[p.type] || '#6366f1';
    const typeLabel = TYPE_LABELS[p.type] || p.type;

    const item = document.createElement('div');
    item.className = `relative flex items-center mb-8 ${isLeft ? 'flex-row' : 'flex-row-reverse'}`;
    item.innerHTML = `
      <div class="absolute left-1/2 -translate-x-1/2 w-4 h-4 rounded-full border-2 z-10" style="background:${color};border-color:${color}"></div>
      <div class="w-[calc(50%-2rem)] ${isLeft ? 'pr-8 text-right' : 'pl-8 text-left'}">
        <div class="bg-bg-card rounded-xl p-4 gradient-border card-hover">
          <div class="flex items-center gap-2 mb-1 ${isLeft ? 'justify-end' : ''}">
            <span class="text-xs px-2 py-0.5 rounded-full font-medium" style="background:${color}22;color:${color}">${typeLabel}</span>
            <span class="text-xs text-gray-500">第${p.ch}章</span>
          </div>
          <p class="text-gray-300 text-sm">${p.event}</p>
        </div>
      </div>
      <div class="w-[calc(50%-2rem)]"></div>
    `;
    container.appendChild(item);
  });
}

function renderWorldSettings() {
  const grid = document.getElementById('world-grid');
  const icons = { '机构': '🏛️', '部门': '📋', '上级': '👔', '灰色势力': '🌙', '地下组织': '⚔️', '地点': '📍' };
  const colors = ['#6366f1', '#8b5cf6', '#a855f7', '#ec4899', '#f43f5e', '#3b82f6', '#06b6d4'];

  grid.innerHTML = DATA.worldSettings.map((w, i) => `
    <div class="bg-bg-card rounded-xl p-5 gradient-border card-hover" style="border-top: 3px solid ${colors[i % colors.length]}">
      <div class="flex items-center gap-3 mb-3">
        <span class="text-2xl">${icons[w.type] || '📄'}</span>
        <div>
          <div class="font-bold text-white text-lg">${w.name}</div>
          <div class="text-xs px-2 py-0.5 rounded-full inline-block" style="background:${colors[i % colors.length]}22;color:${colors[i % colors.length]}">${w.type}</div>
        </div>
      </div>
      <p class="text-gray-400 text-sm leading-relaxed">${w.desc}</p>
    </div>
  `).join('');
}

window.addEventListener('resize', () => {
  if (DATA) renderRelationGraph();
});

loadData();
</script>

</body>
</html>
