<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白日之后 - 创作控制台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #333 #0a0a0f; }
    body { background: #0a0a0f; color: #e5e7eb; font-family: system-ui, -apple-system, sans-serif; }
    .tab-active { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
    .tab-inactive { background: #1a1a2e; color: #9ca3af; }
    .tab-inactive:hover { background: #252540; color: #e5e7eb; }
    [contenteditable]:focus { outline: 1px dashed rgba(99,102,241,0.6); outline-offset: 2px; border-radius: 4px; }
    [contenteditable]:hover { background: rgba(99,102,241,0.05); }
    .chapter-item { transition: all 0.15s; cursor: pointer; }
    .chapter-item:hover { background: rgba(99,102,241,0.1); }
    .chapter-item.active { background: rgba(99,102,241,0.2); border-left: 3px solid #818cf8; }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
    .stat-card { background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.1)); border: 1px solid rgba(99,102,241,0.2); }
    .stat-num { background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .search-highlight { background: rgba(250,204,21,0.3); border-radius: 2px; padding: 0 2px; }
    .heatmap-cell { width: 28px; height: 28px; border-radius: 4px; transition: all 0.15s; }
    .heatmap-cell:hover { transform: scale(1.3); z-index: 10; }
    .timeline-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #818cf8; background: #0a0a0f; position: relative; z-index: 2; }
    .timeline-line { position: absolute; left: 5px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #6366f1, #8b5cf6); z-index: 1; }
    .relationship-line { stroke: #6366f1; stroke-width: 2; fill: none; opacity: 0.6; }
    .relationship-node { cursor: pointer; transition: r 0.2s; }
    .relationship-node:hover { r: 28; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .btn-danger:hover { background: rgba(239,68,68,0.4); }
    #chapterContent { line-height: 1.8; font-size: 16px; white-space: pre-wrap; word-wrap: break-word; }
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 9999; animation: fadeInUp 0.3s ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .empty-state { border: 2px dashed rgba(99,102,241,0.3); border-radius: 12px; padding: 40px; text-align: center; color: #6b7280; }
  </style>
</head>
<body class="min-h-screen">

<!-- Top Navigation -->
<nav class="sticky top-0 z-50 bg-[#0d0d1a]/95 backdrop-blur border-b border-gray-800">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">白日之后 · 创作控制台</h1>
    </div>
    <div class="flex items-center gap-2">
      <input id="globalSearch" type="text" placeholder="搜索全文..." class="px-3 py-1.5 bg-gray-800 border border-gray-700 rounded-lg text-sm w-48 focus:outline-none focus:border-indigo-500" oninput="globalSearchFn(this.value)">
      <button onclick="resetData()" class="px-3 py-1.5 bg-red-600/20 hover:bg-red-600/40 text-red-300 text-sm rounded-lg transition border border-red-600/30">重置</button>
      <button onclick="exportAllJSON()" class="px-3 py-1.5 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 text-sm rounded-lg transition border border-indigo-600/30">导出JSON</button>
      <label class="px-3 py-1.5 bg-purple-600/20 hover:bg-purple-600/40 text-purple-300 text-sm rounded-lg transition border border-purple-600/30 cursor-pointer">
        导入JSON
        <input type="file" accept=".json" onchange="importJSON(event)" class="hidden">
      </label>
    </div>
  </div>
  <div class="max-w-7xl mx-auto px-4 pb-2 flex gap-2 overflow-x-auto">
    <button onclick="switchTab('overview')" class="tab-btn tab-active px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="overview">📊 概览</button>
    <button onclick="switchTab('chapters')" class="tab-btn tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="chapters">📖 正文</button>
    <button onclick="switchTab('characters')" class="tab-btn tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="characters">👤 人物</button>
    <button onclick="switchTab('relations')" class="tab-btn tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="relations">🔗 关系</button>
    <button onclick="switchTab('world')" class="tab-btn tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="world">🌍 世界设定</button>
    <button onclick="switchTab('timeline')" class="tab-btn tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="timeline">⏳ 时间线</button>
    <button onclick="switchTab('notes')" class="tab-btn tab-inactive px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap" data-tab="notes">📝 笔记</button>
  </div>
</nav>

<!-- Tab: Overview -->
<div id="tab-overview" class="tab-content max-w-7xl mx-auto px-4 py-8">
  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8" id="statsCards"></div>
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-[#111128] rounded-xl p-6 border border-gray-800">
      <h3 class="text-lg font-bold mb-4 text-gray-200">各章字数</h3>
      <canvas id="chartChapters" height="200"></canvas>
    </div>
    <div class="bg-[#111128] rounded-xl p-6 border border-gray-800">
      <h3 class="text-lg font-bold mb-4 text-gray-200">角色出场热力图</h3>
      <div class="overflow-x-auto" id="heatmapContainer"></div>
    </div>
  </div>
</div>

<!-- Tab: Chapters -->
<div id="tab-chapters" class="tab-content hidden max-w-7xl mx-auto px-4 py-6">
  <div class="flex h-[calc(100vh-140px)]">
    <!-- Left sidebar -->
    <div class="w-80 flex-shrink-0 bg-[#111128] rounded-l-xl border border-gray-800 flex flex-col">
      <div class="p-3 border-b border-gray-800">
        <input id="chapterSearch" type="text" placeholder="搜索章节..." class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none focus:border-indigo-500" oninput="filterChapters(this.value)">
      </div>
      <div class="flex-1 overflow-y-auto" id="chapterList"></div>
      <div class="p-3 border-t border-gray-800">
        <button onclick="addChapter()" class="w-full py-2 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 text-sm rounded-lg transition border border-indigo-600/30">+ 添加新章节</button>
      </div>
    </div>
    <!-- Right content -->
    <div class="flex-1 bg-[#0d0d1a] rounded-r-xl border border-l-0 border-gray-800 flex flex-col">
      <div class="p-4 border-b border-gray-800 flex items-center justify-between flex-wrap gap-2">
        <div class="flex items-center gap-3">
          <h3 id="chapterTitle" class="text-lg font-bold text-gray-200">选择章节</h3>
          <span id="chapterWordCount" class="text-xs text-gray-500 bg-gray-800 px-2 py-1 rounded">0字</span>
        </div>
        <div class="flex gap-2">
          <button onclick="copyChapter()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg transition">复制本章</button>
          <button onclick="copyAllChapters()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg transition">复制全文</button>
          <button onclick="exportChapterTXT()" class="px-3 py-1.5 bg-gray-700 hover:bg-gray-600 text-sm rounded-lg transition">导出TXT</button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-6">
        <div id="chapterContent" class="min-h-full text-gray-300 focus:outline-none" contenteditable="true" oninput="onChapterEdit()"></div>
      </div>
    </div>
  </div>
</div>

<!-- Tab: Characters -->
<div id="tab-characters" class="tab-content hidden max-w-7xl mx-auto px-4 py-8">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="characterGrid"></div>
  <div class="mt-6">
    <button onclick="addCharacter()" class="px-4 py-2 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 text-sm rounded-lg transition border border-indigo-600/30">+ 添加人物</button>
  </div>
</div>

<!-- Tab: Relationships -->
<div id="tab-relations" class="tab-content hidden max-w-7xl mx-auto px-4 py-8">
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="bg-[#111128] rounded-xl p-6 border border-gray-800">
      <h3 class="text-lg font-bold mb-4 text-gray-200">关系网络</h3>
      <svg id="relationSvg" width="100%" height="400" class="bg-[#0a0a18] rounded-lg"></svg>
    </div>
    <div class="bg-[#111128] rounded-xl p-6 border border-gray-800">
      <h3 class="text-lg font-bold mb-4 text-gray-200">关系列表</h3>
      <div id="relationList" class="space-y-3"></div>
      <button onclick="addRelation()" class="mt-4 px-4 py-2 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 text-sm rounded-lg transition border border-indigo-600/30">+ 添加关系</button>
    </div>
  </div>
</div>

<!-- Tab: World Settings -->
<div id="tab-world" class="tab-content hidden max-w-7xl mx-auto px-4 py-8">
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="worldGrid"></div>
  <div class="mt-6">
    <button onclick="addWorldSetting()" class="px-4 py-2 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 text-sm rounded-lg transition border border-indigo-600/30">+ 添加设定</button>
  </div>
</div>

<!-- Tab: Timeline -->
<div id="tab-timeline" class="tab-content hidden max-w-7xl mx-auto px-4 py-8">
  <div class="max-w-3xl mx-auto">
    <div id="timelineContainer" class="relative pl-8"></div>
    <div class="mt-6 text-center">
      <button onclick="addTimelineEvent()" class="px-4 py-2 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 text-sm rounded-lg transition border border-indigo-600/30">+ 添加事件</button>
    </div>
  </div>
</div>

<!-- Tab: Notes -->
<div id="tab-notes" class="tab-content hidden max-w-7xl mx-auto px-4 py-8">
  <div class="max-w-4xl mx-auto">
    <div id="notesContainer" class="space-y-4"></div>
    <div class="mt-6">
      <button onclick="addNote()" class="px-4 py-2 bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 text-sm rounded-lg transition border border-indigo-600/30">+ 添加笔记</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toastContainer"></div>

<script>
const LS_KEYS = { chapters: 'cz_chapters', analysis: 'cz_analysis', notes: 'cz_notes' };
let chaptersData = [];
let analysisData = { characters: [], relationships: [], worldSettings: [], timeline: [] };
let notesData = [];
let selectedChapter = 0;
let chartInstance = null;

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.background = type === 'success' ? '#059669' : type === 'error' ? '#dc2626' : '#6366f1';
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function save(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function load(key) { try { return JSON.parse(localStorage.getItem(key)); } catch { return null; } }

async function initData() {
  const savedChapters = load(LS_KEYS.chapters);
  const savedAnalysis = load(LS_KEYS.analysis);
  const savedNotes = load(LS_KEYS.notes);

  if (savedChapters && savedAnalysis) {
    chaptersData = savedChapters;
    analysisData = savedAnalysis;
    notesData = savedNotes || [];
  } else {
    try {
      const [chRes, anRes] = await Promise.all([
        fetch('data/chapters.json'),
        fetch('data/analysis.json')
      ]);
      chaptersData = await chRes.json();
      analysisData = await anRes.json();
      notesData = [];
      save(LS_KEYS.chapters, chaptersData);
      save(LS_KEYS.analysis, analysisData);
      save(LS_KEYS.notes, notesData);
    } catch (e) {
      console.error('Failed to load data:', e);
      toast('数据加载失败', 'error');
    }
  }
  renderAll();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.getElementById('tab-' + tab).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.remove('tab-active');
    btn.classList.add('tab-inactive');
    if (btn.dataset.tab === tab) {
      btn.classList.add('tab-active');
      btn.classList.remove('tab-inactive');
    }
  });
  if (tab === 'overview') renderOverview();
  if (tab === 'relations') renderRelationGraph();
}

function renderAll() {
  renderOverview();
  renderChapterList();
  renderCharacters();
  renderRelations();
  renderWorldSettings();
  renderTimeline();
  renderNotes();
  if (chaptersData.length > 0) selectChapter(0);
}

// ===== OVERVIEW =====
function renderOverview() {
  const totalChars = chaptersData.reduce((s, c) => s + (c.chars_with_punct || 0), 0);
  const avgChars = chaptersData.length ? Math.round(totalChars / chaptersData.length) : 0;
  const longest = chaptersData.reduce((a, b) => (a.chars_with_punct||0) > (b.chars_with_punct||0) ? a : b, chaptersData[0]);
  const shortest = chaptersData.reduce((a, b) => (a.chars_with_punct||0) < (b.chars_with_punct||0) ? a : b, chaptersData[0]);

  document.getElementById('statsCards').innerHTML = [
    { label: '总字数(含标点)', val: totalChars.toLocaleString() },
    { label: '章节数', val: chaptersData.length },
    { label: '角色数', val: analysisData.characters.length },
    { label: '平均章字数', val: avgChars.toLocaleString() },
    { label: '最长章', val: (longest?.title || '-') + ' ' + (longest?.chars_with_punct||0) },
    { label: '最短章', val: (shortest?.title || '-') + ' ' + (shortest?.chars_with_punct||0) }
  ].map(s => `<div class="stat-card rounded-xl p-4 text-center card-hover"><div class="stat-num text-2xl font-bold">${s.val}</div><div class="text-gray-400 text-xs mt-1">${s.label}</div></div>`).join('');

  renderChart();
  renderHeatmap();
}

function renderChart() {
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('chartChapters').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: chaptersData.map((c, i) => c.title || '第' + (i+1) + '章'),
      datasets: [{
        data: chaptersData.map(c => c.chars_with_punct || 0),
        backgroundColor: chaptersData.map((_, i) => {
          const hue = (i * 10 + 230) % 360;
          return `hsla(${hue}, 70%, 60%, 0.7)`;
        }),
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9ca3af', font: { size: 9 }, maxRotation: 90 }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { ticks: { color: '#9ca3af' }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

function renderHeatmap() {
  const chars = analysisData.characters;
  const chCount = chaptersData.length;
  if (!chars.length || !chCount) {
    document.getElementById('heatmapContainer').innerHTML = '<div class="text-gray-500 text-sm">暂无数据</div>';
    return;
  }
  let html = '<table class="text-xs"><tr><th class="px-1 py-1 text-gray-500"></th>';
  for (let i = 0; i < chCount; i++) html += `<th class="px-1 py-1 text-gray-500" title="${chaptersData[i]?.title||''}">${i+1}</th>`;
  html += '</tr>';
  chars.forEach(ch => {
    html += `<tr><td class="px-2 py-1 text-gray-300 whitespace-nowrap font-medium" style="color:${ch.color}">${ch.name}</td>`;
    for (let i = 0; i < chCount; i++) {
      const has = (chapters_data_has_character(ch, i));
      const intensity = has ? 0.8 : 0.05;
      const color = ch.color || '#6366f1';
      html += `<td><div class="heatmap-cell" style="background:${color};opacity:${intensity}" title="${ch.name} - ${chaptersData[i]?.title||''}"></div></td>`;
    }
    html += '</tr>';
  });
  html += '</table>';
  document.getElementById('heatmapContainer').innerHTML = html;
}

function chapters_data_has_character(charObj, chapterIdx) {
  const charName = charObj.name;
  const ch = chaptersData[chapterIdx];
  if (!ch || !ch.content) return false;
  return ch.content.includes(charName);
}

// ===== CHAPTERS =====
function renderChapterList(filter = '') {
  const list = document.getElementById('chapterList');
  const filtered = chaptersData.map((c, i) => ({...c, idx: i})).filter(c => {
    if (!filter) return true;
    return (c.title || '').includes(filter) || (c.content || '').includes(filter);
  });
  list.innerHTML = filtered.map(c => `
    <div class="chapter-item px-4 py-3 border-b border-gray-800/50 ${c.idx === selectedChapter ? 'active' : ''}" onclick="selectChapter(${c.idx})">
      <div class="text-sm font-medium text-gray-200">${c.title || '未命名章节'}</div>
      <div class="text-xs text-gray-500 mt-1">${(c.chars_with_punct||0).toLocaleString()}字 · ${c.lines||0}行</div>
    </div>
  `).join('');
}

function filterChapters(val) { renderChapterList(val); }

function selectChapter(idx) {
  selectedChapter = idx;
  const ch = chaptersData[idx];
  document.getElementById('chapterTitle').textContent = ch?.title || '未命名';
  document.getElementById('chapterContent').textContent = ch?.content || '';
  document.getElementById('chapterWordCount').textContent = (ch?.chars_with_punct || 0) + '字';
  renderChapterList(document.getElementById('chapterSearch')?.value || '');
}

function onChapterEdit() {
  const content = document.getElementById('chapterContent').textContent;
  chaptersData[selectedChapter].content = content;
  const cn = (content.match(/[\u4e00-\u9fff]/g) || []).length;
  const punct = (content.match(/[^\u4e00-\u9fff\n\r\s]/g) || []).length;
  chaptersData[selectedChapter].chinese_only = cn;
  chaptersData[selectedChapter].punctuation = punct;
  chaptersData[selectedChapter].chars_with_punct = cn + punct;
  chaptersData[selectedChapter].lines = content.split('\n').length;
  document.getElementById('chapterWordCount').textContent = (cn + punct) + '字';
  save(LS_KEYS.chapters, chaptersData);
  renderChapterList(document.getElementById('chapterSearch')?.value || '');
}

function addChapter() {
  const num = chaptersData.length + 1;
  chaptersData.push({
    title: '新章节 ' + num,
    content: '',
    chars_with_punct: 0,
    chinese_only: 0,
    punctuation: 0,
    lines: 0
  });
  save(LS_KEYS.chapters, chaptersData);
  selectChapter(chaptersData.length - 1);
  renderChapterList();
  toast('已添加新章节');
}

function copyChapter() {
  const ch = chaptersData[selectedChapter];
  if (!ch) return;
  navigator.clipboard.writeText(ch.content || '').then(() => toast('已复制本章'));
}

function copyAllChapters() {
  const text = chaptersData.map(c => (c.title || '') + '\n\n' + (c.content || '')).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).then(() => toast('已复制全文'));
}

function exportChapterTXT() {
  const ch = chaptersData[selectedChapter];
  if (!ch) return;
  const blob = new Blob([ch.content || ''], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (ch.title || '章节') + '.txt';
  a.click();
  toast('已导出TXT');
}

// ===== CHARACTERS =====
function renderCharacters() {
  const grid = document.getElementById('characterGrid');
  grid.innerHTML = analysisData.characters.map((ch, i) => `
    <div class="bg-[#111128] rounded-xl p-5 border border-gray-800 card-hover relative group">
      <button onclick="deleteCharacter(${i})" class="absolute top-3 right-3 opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-300 text-sm transition" title="删除">✕</button>
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-lg" style="background:${ch.color}">${(ch.name||'?')[0]}</div>
        <div>
          <div class="font-bold text-gray-200" contenteditable="true" onblur="updateChar(${i},'name',this.textContent)">${ch.name||''}</div>
          <div class="text-xs text-gray-500" contenteditable="true" onblur="updateChar(${i},'role',this.textContent)">${ch.role||''}</div>
        </div>
      </div>
      <div class="text-sm text-gray-400 mb-3" contenteditable="true" onblur="updateChar(${i},'desc',this.textContent)">${ch.desc||''}</div>
      <div class="flex items-center gap-2 mb-2">
        <span class="text-xs text-gray-500">颜色:</span>
        <input type="color" value="${ch.color||'#6366f1'}" onchange="updateChar(${i},'color',this.value);this.previousElementSibling.parentElement.querySelector('.w-10').style.background=this.value" class="w-6 h-6 rounded cursor-pointer border-0">
      </div>
      <div class="text-xs text-indigo-300 italic" contenteditable="true" onblur="updateChar(${i},'quote',this.textContent)">"${ch.quote||''}"</div>
    </div>
  `).join('');
}

function updateChar(i, field, val) {
  analysisData.characters[i][field] = val;
  save(LS_KEYS.analysis, analysisData);

      <button onclick="deleteRel(${i})" class="text-red-400 hover:text-red-300 text-sm opacity-0 group-hover:opacity-100 transition">✕</button>

function renderRelationGraph() {
  const svg = document.getElementById('relationSvg');
  if (!svg) return;
  const width = svg.clientWidth || 600;
  const height = 400;
  const names = [...new Set(analysisData.relationships.flatMap(r => [r.from, r.to].filter(Boolean)))];
  if (!names.length) { svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#6b7280" font-size="14">暂无关系数据</text>'; return; }

  const cx = width / 2, cy = height / 2;
  const radius = Math.min(width, height) * 0.35;
  const positions = {};
  names.forEach((n, i) => {
    const angle = (i / names.length) * Math.PI * 2 - Math.PI / 2;
    positions[n] = { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
  });

  let html = '';
  analysisData.relationships.forEach(r => {
    if (!positions[r.from] || !positions[r.to]) return;
    const p1 = positions[r.from], p2 = positions[r.to];
    html += `<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" class="relationship-line" stroke-width="${r.strength || 2}"/>`;
    const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
    html += `<text x="${mx}" y="${my - 5}" text-anchor="middle" fill="#9ca3af" font-size="10">${r.label}</text>`;
  });

  names.forEach(n => {
    const p = positions[n];
    const charObj = analysisData.characters.find(c => c.name === n);
    const color = charObj?.color || '#6366f1';
    html += `<circle cx="${p.x}" cy="${p.y}" r="22" fill="${color}" class="relationship-node" opacity="0.85"/>`;
    html += `<text x="${p.x}" y="${p.y + 4}" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">${n}</text>`;
  });

  svg.innerHTML = html;
}

// ===== GLOBAL SEARCH =====
function globalSearchFn(query) {
  if (!query.trim()) return;
  switchTab('chapters');
  document.getElementById('chapterSearch').value = query;
  filterChapters(query);
  // Also highlight in content if a chapter matches
  const idx = chaptersData.findIndex(c => (c.content || '').includes(query));
  if (idx >= 0) selectChapter(idx);
}

// ===== IMPORT / EXPORT / RESET =====
function exportAllJSON() {
  const data = { chapters: chaptersData, analysis: analysisData, notes: notesData };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '创作控制台_备份_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  toast('已导出全部JSON');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.chapters) chaptersData = data.chapters;
      if (data.analysis) analysisData = data.analysis;
      if (data.notes) notesData = data.notes;
      save(LS_KEYS.chapters, chaptersData);
      save(LS_KEYS.analysis, analysisData);
      save(LS_KEYS.notes, notesData);
      renderAll();
      toast('导入成功');
    } catch (err) {
      toast('导入失败：JSON格式错误', 'error');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetData() {
  if (!confirm('确定要重置所有数据？localStorage中的数据将被清除，重新从文件加载。')) return;
  localStorage.removeItem(LS_KEYS.chapters);
  localStorage.removeItem(LS_KEYS.analysis);
  localStorage.removeItem(LS_KEYS.notes);
  notesData = [];
  initData();
  toast('已重置');
}
