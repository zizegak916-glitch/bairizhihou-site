<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白日之后 - 全方位剖析</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    * { scrollbar-width: thin; scrollbar-color: #444 #0a0a0f; }
    body { background: #0a0a0f; color: #e5e7eb; }
    .glow { box-shadow: 0 0 30px rgba(99, 102, 241, 0.1); }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
    .gradient-border { border: 1px solid transparent; background-clip: padding-box; position: relative; }
    .gradient-border::before { content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; pointer-events: none; }
    .stat-number { background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    [contenteditable]:focus { outline: 1px dashed rgba(99, 102, 241, 0.5); outline-offset: 2px; border-radius: 4px; }
    [contenteditable]:hover { background: rgba(99, 102, 241, 0.05); }
    .timeline-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, #6366f1, #8b5cf6, #a855f7); }
  </style>
</head>
<body class="min-h-screen">

  <!-- Top bar -->
  <div class="fixed top-4 right-4 z-50 flex gap-2">
    <button onclick="exportJSON()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm rounded-lg transition">导出JSON</button>
    <button onclick="resetData()" class="px-4 py-2 bg-red-600 hover:bg-red-500 text-white text-sm rounded-lg transition">重置</button>
  </div>

  <!-- Hero -->
  <section class="relative flex items-center justify-center min-h-[80vh] overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-br from-indigo-900/20 via-purple-900/10 to-black"></div>
    <div class="absolute top-20 left-20 w-72 h-72 bg-indigo-500/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl"></div>
    <div class="relative z-10 text-center px-6">
      <h1 class="text-6xl md:text-8xl font-bold mb-6 bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent" contenteditable="true" data-field="title">白日之后</h1>
      <p class="text-xl md:text-2xl text-gray-400 mb-10 tracking-widest" contenteditable="true" data-field="subtitle">全方位剖析</p>
      <div class="flex flex-wrap justify-center gap-8">
        <div class="text-center"><div class="stat-number text-4xl font-bold" contenteditable="true" data-field="stat1">83528字</div><div class="text-gray-500 text-sm mt-1" contenteditable="true" data-field="stat1Label">总字数</div></div>
        <div class="text-center"><div class="stat-number text-4xl font-bold" contenteditable="true" data-field="stat2">34章</div><div class="text-gray-500 text-sm mt-1" contenteditable="true" data-field="stat2Label">章节数</div></div>
        <div class="text-center"><div class="stat-number text-4xl font-bold" contenteditable="true" data-field="stat3">8角色</div><div class="text-gray-500 text-sm mt-1" contenteditable="true" data-field="stat3Label">人物数</div></div>
        <div class="text-center"><div class="stat-number text-4xl font-bold" contenteditable="true" data-field="stat4">7世界设定</div><div class="text-gray-500 text-sm mt-1" contenteditable="true" data-field="stat4Label">世界设定</div></div>
      </div>
    </div>
  </section>

  <!-- 人物卡片 -->
  <section class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent" contenteditable="true">人物图鉴</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="character-grid"></div>
  </section>

  <!-- 字数统计 -->
  <section class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent" contenteditable="true">章节字数统计</h2>
    <div class="bg-[#111] rounded-2xl p-6 gradient-border">
      <canvas id="wordChart" height="300"></canvas>
    </div>
  </section>

  <!-- 关系网络 -->
  <section class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent" contenteditable="true">人物关系</h2>
    <div class="bg-[#111] rounded-2xl p-6 gradient-border relative" style="height: 500px;">
      <svg id="relationSvg" width="100%" height="100%"></svg>
    </div>
  </section>

  <!-- 情节时间线 -->
  <section class="max-w-5xl mx-auto px-6 py-20">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent" contenteditable="true">关键情节时间线</h2>
    <div class="relative" id="timeline-container"></div>
  </section>

  <!-- 世界设定 -->
  <section class="max-w-7xl mx-auto px-6 py-20">
    <h2 class="text-3xl font-bold mb-10 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent" contenteditable="true">世界设定</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="world-grid"></div>
  </section>

  <footer class="text-center py-10 text-gray-600 text-sm border-t border-gray-800">白日之后 - 数据分析</footer>

<script>
const LS_KEY = 'bairizhihou_data';

const DEFAULT_DATA = {
  characters: [
    { name: "陈亦", role: "穿越者", desc: "从现代穿越到沈怀身体，拥有墨未干和补痕能力。怕死、嘴毒、怕麻烦，但聪明。", color: "#e74c3c" },
    { name: "陆执灯", role: "关键人物", desc: "唯一知道陈亦不是沈怀的人。沈怀知识的唯一通道。亦敌亦友。", color: "#3498db" },
    { name: "曹留", role: "上司", desc: "录房主事，冷面热心。能截声。保护陈亦但不说明。", color: "#2ecc71" },
    { name: "谢观成", role: "中间人", desc: "前中枢经历，曾为银号做事，现在站下湾。", color: "#f39c12" },
    { name: "罗小满", role: "导淮少年", desc: "导淮传信人，腿快嘴快。", color: "#1abc9c" },
    { name: "老孟", role: "导淮老人", desc: "下湾老人，三十七项幸存者。", color: "#e67e22" },
    { name: "杜衡", role: "高层", desc: "水衡司主簿，眼神薄，看人不急。", color: "#c0392b" },
    { name: "沈怀", role: "前身", desc: "水衡司录房小吏，查下湾三十七项被杀。", color: "#9b59b6" }
  ],
  relationships: [
    { from: "陈亦", to: "陆执灯", label: "交易/亦敌亦友", strength: 4 },
    { from: "陈亦", to: "曹留", label: "保护", strength: 5 },
    { from: "陈亦", to: "谢观成", label: "合作", strength: 3 },
    { from: "陈亦", to: "罗小满", label: "盟友", strength: 3 },
    { from: "陈亦", to: "杜衡", label: "对抗", strength: 3 },
    { from: "陆执灯", to: "沈怀", label: "旧识", strength: 4 },
    { from: "曹留", to: "杜衡", label: "对抗", strength: 3 },
    { from: "谢观成", to: "老孟", label: "导淮同伙", strength: 4 },
    { from: "罗小满", to: "老孟", label: "导淮同伙", strength: 5 },
    { from: "谢观成", to: "陆执灯", label: "互相知道", strength: 2 }
  ],
  chapters: [
    { name: "序章", chars: 1656 },
    { name: "今日未平", chars: 4208 },
    { name: "归录", chars: 3156 },
    { name: "补录", chars: 2178 },
    { name: "旧鞋", chars: 1324 },
    { name: "夜诊", chars: 1501 },
    { name: "上值", chars: 1899 },
    { name: "工牌", chars: 783 },
    { name: "陆本", chars: 1002 },
    { name: "补痕", chars: 1417 },
    { name: "下湾", chars: 1028 },
    { name: "旧堤", chars: 922 },
    { name: "账链", chars: 782 },
    { name: "夜查", chars: 1754 },
    { name: "候验", chars: 2029 },
    { name: "刀", chars: 2212 },
    { name: "归座", chars: 2520 },
    { name: "废纸库", chars: 2459 },
    { name: "补痕", chars: 2756 },
    { name: "旧录", chars: 4041 },
    { name: "夜会", chars: 4211 },
    { name: "账签", chars: 4147 },
    { name: "照并", chars: 1823 },
    { name: "落笔", chars: 2191 },
    { name: "封账", chars: 3112 },
    { name: "定水", chars: 3140 },
    { name: "划线", chars: 2843 },
    { name: "未收", chars: 2519 },
    { name: "第一眼", chars: 2632 },
    { name: "勿拆", chars: 2759 },
    { name: "夜查", chars: 3424 },
    { name: "半截骨头", chars: 4511 },
    { name: "候验席", chars: 3246 },
    { name: "旧死了", chars: 3343 }
  ],
  timeline: [
    { ch: "ch0", event: "沈怀死陈亦醒来", type: "转折" },
    { ch: "ch1", event: "停尸房穿越", type: "发现" },
    { ch: "ch5", event: "陆执灯出场", type: "人物" },
    { ch: "ch14", event: "你到底是谁", type: "转折" },
    { ch: "ch14.5", event: "陆执灯交易", type: "转折" },
    { ch: "ch16", event: "废纸库补痕", type: "发现" },
    { ch: "ch19", event: "夜会导淮", type: "转折" },
    { ch: "ch20", event: "银号出场", type: "人物" },
    { ch: "ch21", event: "誊录第三栏", type: "危机" },
    { ch: "ch23", event: "照并封案", type: "危机" },
    { ch: "ch24", event: "杜衡问底稿", type: "危机" },
    { ch: "ch27", event: "余损三十七项", type: "发现" },
    { ch: "ch28", event: "沈怀后手", type: "发现" }
  ],
  worldSettings: [
    { name: "水衡司", type: "机构", desc: "管水的衙门" },
    { name: "录房", type: "部门", desc: "誊录核账封册" },
    { name: "中枢", type: "上级", desc: "朝廷控制地方" },
    { name: "背债银号", type: "灰色势力", desc: "买卖情报判断" },
    { name: "导淮", type: "地下组织", desc: "下湾幸存者" },
    { name: "下湾", type: "地点", desc: "旧堤旧工区" },
    { name: "废纸库", type: "地点", desc: "录房后面旧屋" }
  ]
};

function loadData() {
  const saved = localStorage.getItem(LS_KEY);
  return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() {
  const data = {
    characters: [],
    relationships: [],
    chapters: [],
    timeline: [],
    worldSettings: []
  };
  document.querySelectorAll('.char-card').forEach(card => {
    data.characters.push({
      name: card.querySelector('.char-name')?.textContent.trim() || "",
      role: card.querySelector('.char-role')?.textContent.trim() || "",
      desc: card.querySelector('.char-desc')?.textContent.trim() || "",
      color: card.dataset.color || "#666"
    });
  });
  document.querySelectorAll('.rel-row').forEach(row => {
    data.relationships.push({
      from: row.querySelector('.rel-from')?.textContent.trim() || "",
      to: row.querySelector('.rel-to')?.textContent.trim() || "",
      label: row.querySelector('.rel-label')?.textContent.trim() || "",
      strength: parseInt(row.querySelector('.rel-strength')?.textContent.trim()) || 3
    });
  });
  document.querySelectorAll('.ch-item').forEach(item => {
    data.chapters.push({
      name: item.querySelector('.ch-name')?.textContent.trim() || "",
      chars: parseInt(item.querySelector('.ch-chars')?.textContent.trim()) || 0
    });
  });
  document.querySelectorAll('.tl-item').forEach(item => {
    data.timeline.push({
      ch: item.querySelector('.tl-ch')?.textContent.trim() || "",
      event: item.querySelector('.tl-event')?.textContent.trim() || "",
      type: item.querySelector('.tl-type')?.textContent.trim() || ""
    });
  });
  document.querySelectorAll('.ws-card').forEach(card => {
    data.worldSettings.push({
      name: card.querySelector('.ws-name')?.textContent.trim() || "",
      type: card.querySelector('.ws-type')?.textContent.trim() || "",
      desc: card.querySelector('.ws-desc')?.textContent.trim() || ""
    });
  });
  localStorage.setItem(LS_KEY, JSON.stringify(data));
}

function resetData() {
  localStorage.removeItem(LS_KEY);
  location.reload();
}

function exportJSON() {
  const data = loadData();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bairizhihou_data.json';
  a.click();
}

function renderCharacters(data) {
  const grid = document.getElementById('character-grid');
  grid.innerHTML = data.characters.map(c => `
    <div class="bg-[#111] rounded-xl p-5 gradient-border card-hover char-card" data-color="${c.color}">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-lg" style="background:${c.color}">${c.name[0]}</div>
        <div>
          <div class="font-bold text-white char-name" contenteditable="true">${c.name}</div>
          <div class="text-xs text-gray-500 char-role" contenteditable="true">${c.role}</div>
        </div>
      </div>
      <p class="text-gray-400 text-sm leading-relaxed char-desc" contenteditable="true">${c.desc}</p>
    </div>
  `).join('');
}

function renderChart(data) {
  const ctx = document.getElementById('wordChart').getContext('2d');
  const labels = data.chapters.map(ch => ch.name);
  const values = data.chapters.map(ch => ch.chars);
  const max = Math.max(...values);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '字数',
        data: values,
        backgroundColor: values.map(v => `rgba(99,102,241,${0.3 + (v/max)*0.7})`),
        borderColor: 'rgba(99,102,241,0.8)',
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#666', maxRotation: 45 }, grid: { color: '#222' } },
        y: { ticks: { color: '#666' }, grid: { color: '#222' } }
      }
    }
  });
}

function renderRelations(data) {
  const svg = document.getElementById('relationSvg');
  const rect = svg.getBoundingClientRect();
  const W = rect.width, H = rect.height;
  const cx = W / 2, cy = H / 2;
  const radius = Math.min(W, H) * 0.35;

  const positions = {};
  data.characters.forEach((c, i) => {
    const angle = (i / data.characters.length) * Math.PI * 2 - Math.PI / 2;
    positions[c.name] = { x: cx + Math.cos(angle) * radius, y: cy + Math.sin(angle) * radius, color: c.color };
  });

  let svgContent = '';
  data.relationships.forEach(r => {
    const a = positions[r.from], b = positions[r.to];
    if (!a || !b) return;
    const opacity = 0.15 + r.strength * 0.1;
    const width = 0.5 + r.strength * 0.4;
    svgContent += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="rgba(255,255,255,${opacity})" stroke-width="${width}"/>`;
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    svgContent += `<text x="${mx}" y="${my - 6}" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">${r.label}</text>`;
  });

  data.characters.forEach(c => {
    const p = positions[c.name];
    svgContent += `<circle cx="${p.x}" cy="${p.y}" r="24" fill="${p.color}" stroke="rgba(0,0,0,0.3)" stroke-width="2"/>`;
    svgContent += `<text x="${p.x}" y="${p.y + 1}" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="12" font-weight="bold">${c.name}</text>`;
    svgContent += `<text x="${p.x}" y="${p.y + 36}" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">${c.role}</text>`;
  });

  svg.innerHTML = svgContent;
}

function renderRelationshipsTable(data) {
  const grid = document.getElementById('rel-table');
  if (!grid) return;
  grid.innerHTML = data.relationships.map(r => `
    <div class="flex items-center gap-2 bg-[#111] rounded-lg px-4 py-2 gradient-border rel-row">
      <span class="text-white font-medium flex-1 rel-from" contenteditable="true">${r.from}</span>
      <span class="text-gray-500">→</span>
      <span class="text-white font-medium flex-1 rel-to" contenteditable="true">${r.to}</span>
      <span class="text-gray-400 text-sm flex-1 rel-label" contenteditable="true">${r.label}</span>
      <span class="text-indigo-400 font-bold w-8 text-center rel-strength" contenteditable="true">${r.strength}</span>
    </div>
  `).join('');
}

function renderTimeline(data) {
  const container = document.getElementById('timeline-container');
  const TYPE_MAP = { "转折": "#f59e0b", "发现": "#3b82f6", "人物": "#10b981", "危机": "#ef4444" };
  let html = '<div class="timeline-line"></div>';
  data.timeline.forEach((item, i) => {
    const isLeft = i % 2 === 0;
    const color = TYPE_MAP[item.type] || '#6366f1';
    html += `
      <div class="relative flex items-center mb-8 ${isLeft ? 'flex-row' : 'flex-row-reverse'} tl-item">
        <div class="absolute left-1/2 -translate-x-1/2 w-4 h-4 rounded-full border-2 z-10" style="background:${color};border-color:${color}"></div>
        <div class="w-[calc(50%-2rem)] ${isLeft ? 'pr-8 text-right' : 'pl-8 text-left'}">
          <div class="bg-[#111] rounded-xl p-4 gradient-border card-hover">
            <div class="flex items-center gap-2 mb-1 ${isLeft ? 'justify-end' : ''}">
              <span class="text-xs px-2 py-0.5 rounded-full font-medium tl-type" style="background:${color}22;color:${color}" contenteditable="true">${item.type}</span>
              <span class="text-xs text-gray-500 tl-ch" contenteditable="true">${item.ch}</span>
            </div>
            <p class="text-gray-300 text-sm tl-event" contenteditable="true">${item.event}</p>
          </div>
        </div>
        <div class="w-[calc(50%-2rem)]"></div>
      </div>`;
  });
  container.innerHTML = html;
}

function renderWorldSettings(data) {
  const grid = document.getElementById('world-grid');
  const icons = { '机构': '🏛️', '部门': '📋', '上级': '👔', '灰色势力': '🌙', '地下组织': '⚔️', '地点': '📍' };
  const colors = ['#6366f1', '#8b5cf6', '#a855f7', '#ec4899', '#f43f5e', '#3b82f6', '#06b6d4'];
  grid.innerHTML = data.worldSettings.map((w, i) => `
    <div class="bg-[#111] rounded-xl p-5 gradient-border card-hover ws-card" style="border-top: 3px solid ${colors[i % colors.length]}">
      <div class="flex items-center gap-3 mb-3">
        <span class="text-2xl">${icons[w.type] || '📄'}</span>
        <div>
          <div class="font-bold text-white text-lg ws-name" contenteditable="true">${w.name}</div>
          <div class="text-xs px-2 py-0.5 rounded-full inline-block ws-type" style="background:${colors[i % colors.length]}22;color:${colors[i % colors.length]}" contenteditable="true">${w.type}</div>
        </div>
      </div>
      <p class="text-gray-400 text-sm leading-relaxed ws-desc" contenteditable="true">${w.desc}</p>
    </div>
  `).join('');
}

function renderAll() {
  const data = loadData();
  renderCharacters(data);
  renderChart(data);
  renderRelations(data);
  renderTimeline(data);
  renderWorldSettings(data);
}

document.addEventListener('blur', e => {
  if (e.target.hasAttribute('contenteditable')) saveData();
}, true);

document.addEventListener('input', e => {
  if (e.target.hasAttribute('contenteditable')) {
    clearTimeout(e.target._debounce);
    e.target._debounce = setTimeout(saveData, 500);
  }
});

window.addEventListener('resize', () => {
  const data = loadData();
  renderRelations(data);
});

renderAll();
</script>

</body>
</html>
