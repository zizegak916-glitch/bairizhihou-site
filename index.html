<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人间仍存</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#d4d4d4;font-family:serif;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0a0a0f}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}
.nav-tab{padding:8px 16px;white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-size:14px;color:#888;user-select:none}
.nav-tab:hover{color:#d4d4d4}
.nav-tab.active{color:#fff;border-bottom-color:#8b5cf6}
.card{background:#111128;border:1px solid #1e1e3a;border-radius:12px;padding:20px;transition:transform .15s}
.card:hover{transform:translateY(-1px)}
.chapter-content{font-size:18px;line-height:2.0;color:#d4d4d4;max-width:700px;margin:0 auto;padding:20px}
.chapter-content p{margin-bottom:1em;text-indent:2em}
.chapter-nav-btn{background:#1e1e3a;border:1px solid #2e2e4a;color:#d4d4d4;padding:8px 20px;border-radius:8px;cursor:pointer;transition:all .2s;font-size:14px}
.chapter-nav-btn:hover{background:#2e2e4a;border-color:#8b5cf6}
.chapter-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.copy-btn{background:#1e1e3a;border:1px solid #2e2e4a;color:#888;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s;font-size:13px;display:inline-flex;align-items:center;gap:4px}
.copy-btn:hover{background:#2e2e4a;color:#fff;border-color:#8b5cf6}
.copy-btn.copied{background:#2ecc71;border-color:#2ecc71;color:#fff}
.heatmap-cell{width:14px;height:14px;border-radius:2px;transition:transform .1s}
.heatmap-cell:hover{transform:scale(1.8);z-index:10}
.stat-card{background:linear-gradient(135deg,#111128 0%,#1a1a3e 100%);border:1px solid #1e1e3a;border-radius:12px;padding:20px;text-align:center}
@media(max-width:768px){
  .chapter-content{font-size:17px;padding:16px}
  .nav-tab{padding:8px 12px;font-size:13px}
}
.tab-panel{display:none;animation:fadeIn .25s ease}
.tab-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.world-card{border-left:3px solid}
.outline-content{font-size:16px;line-height:1.9;color:#c4c4c4;max-width:750px;margin:0 auto}
.outline-content p{margin-bottom:.8em}
</style>
</head>
<body>
<nav id="topNav" style="position:sticky;top:0;z-index:50;background:linear-gradient(135deg,#0a0a1a 0%,#111128 100%);border-bottom:1px solid #1e1e3a">
  <div style="max-width:1200px;margin:0 auto;display:flex;align-items:center">
    <div style="padding:12px 16px;font-size:18px;font-weight:bold;color:#8b5cf6;white-space:nowrap;font-family:serif">人间仍存</div>
    <div id="tabsContainer" style="display:flex;overflow-x:auto;flex:1;-webkit-overflow-scrolling:touch;scrollbar-width:none" class="no-scrollbar">
      <div class="nav-tab active" data-tab="overview">📊 概览</div>
      <div class="nav-tab" data-tab="chapters">📖 正文</div>
      <div class="nav-tab" data-tab="characters">👤 人物</div>
      <div class="nav-tab" data-tab="relations">🔗 关系</div>
      <div class="nav-tab" data-tab="world">🌍 世界观</div>
      <div class="nav-tab" data-tab="outline">📋 大纲</div>
      <div class="nav-tab" data-tab="patches">🔧 补丁集</div>
    </div>
  </div>
</nav>

<main style="max-width:1200px;margin:0 auto;padding:16px">
  <div id="panel-overview" class="tab-panel active"></div>
  <div id="panel-chapters" class="tab-panel"></div>
  <div id="panel-characters" class="tab-panel"></div>
  <div id="panel-relations" class="tab-panel"></div>
  <div id="panel-world" class="tab-panel"></div>
  <div id="panel-outline" class="tab-panel"></div>
  <div id="panel-patches" class="tab-panel"></div>
</main>

<script>
let chaptersData=[],analysisData={},currentChapter=0,chartInstance=null;

async function loadData(){
  const [chRes,anRes]=await Promise.all([
    fetch('data/chapters.json'),fetch('data/analysis.json')
  ]);
  chaptersData=await chRes.json();
  analysisData=await anRes.json();
  renderAll();
}

function renderAll(){
  renderOverview();
  renderChapters();
  renderCharacters();
  renderRelations();
  renderWorld();
  renderOutline();
  renderPatches();
}

function renderOverview(){
  const panel=document.getElementById('panel-overview');
  const totalChars=chaptersData.reduce((s,c)=>s+c.chars_with_punct,0);
  const chapterCount=chaptersData.length;
  const avgChars=Math.round(totalChars/chapterCount);
  const charCount=analysisData.characters?analysisData.characters.length:0;

  let html=`
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px">
    <div class="stat-card"><div style="font-size:32px;font-weight:bold;color:#8b5cf6">${chapterCount}</div><div style="font-size:13px;color:#888;margin-top:4px">总章数</div></div>
    <div class="stat-card"><div style="font-size:32px;font-weight:bold;color:#3498db">${totalChars.toLocaleString()}</div><div style="font-size:13px;color:#888;margin-top:4px">总字数(含标点)</div></div>
    <div class="stat-card"><div style="font-size:32px;font-weight:bold;color:#2ecc71">${avgChars.toLocaleString()}</div><div style="font-size:13px;color:#888;margin-top:4px">平均每章字数</div></div>
    <div class="stat-card"><div style="font-size:32px;font-weight:bold;color:#e74c3c">${charCount}</div><div style="font-size:13px;color:#888;margin-top:4px">人物/势力</div></div>
  </div>
  <div class="card" style="margin-bottom:24px">
    <div style="font-size:16px;font-weight:600;margin-bottom:16px;color:#fff">📊 各章字数分布</div>
    <div style="position:relative;height:300px;width:100%"><canvas id="barChart"></canvas></div>
  </div>
  <div class="card">
    <div style="font-size:16px;font-weight:600;margin-bottom:16px;color:#fff">🔥 人物出场热力图</div>
    <div id="heatmapContainer" style="overflow-x:auto"></div>
  </div>`;
  panel.innerHTML=html;

  const labels=[],values=[];
  for(let i=0;i<chaptersData.length;i++){
    labels.push('第'+(i+1)+'章');
    values.push(chaptersData[i].chars_with_punct);
  }
  const ctx=document.getElementById('barChart').getContext('2d');
  chartInstance=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[{label:'字数',data:values,backgroundColor:'rgba(139,92,246,0.6)',borderColor:'rgba(139,92,246,1)',borderWidth:1,borderRadius:3}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+' 字'}}},
      scales:{x:{ticks:{color:'#666',font:{size:10},maxRotation:45},grid:{display:false}},y:{ticks:{color:'#666'},grid:{color:'#1e1e3a'}}}
    }
  });

  renderHeatmap();
}

function renderHeatmap(){
  const container=document.getElementById('heatmapContainer');
  if(!analysisData.characters||!container)return;
  const coreChars=analysisData.characters.filter(c=>['陈亦','陆执灯','曹留','谢观成','罗小满','老孟','杜衡','沈怀'].includes(c.name));
  const chapterCount=chaptersData.length;
  let html='<div style="display:flex;gap:4px;margin-bottom:8px;padding-left:90px">';
  for(let i=1;i<=chapterCount;i++){
    html+='<div style="width:14px;text-align:center;font-size:9px;color:#555">'+i+'</div>';
  }
  html+='</div>';
  for(const ch of coreChars){
    html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">';
    html+='<div style="width:82px;text-align:right;font-size:12px;color:'+ch.color+';flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ch.name+'</div>';
    for(let i=0;i<chaptersData.length;i++){
      const content=chaptersData[i].content||'';
      const count=(content.match(new RegExp(ch.name,'g'))||[]).length;
      const intensity=Math.min(count/5,1);
      const bg=intensity===0?'#1a1a2e':`rgba(${parseInt(ch.color.slice(1,3),16)},${parseInt(ch.color.slice(3,5),16)},${parseInt(ch.color.slice(5,7),16)},${0.2+intensity*0.8})`;
      html+='<div class="heatmap-cell" style="background:'+bg+'" title="'+ch.name+' 第'+(i+1)+'章: '+count+'次"></div>';
    }
    html+='</div>';
  }
  container.innerHTML=html;
}

function renderChapters(){
  const panel=document.getElementById('panel-chapters');
  let listHtml='';
  chaptersData.forEach((ch,i)=>{
    const num=i+1;
    listHtml+=`<div class="chapter-item" data-idx="${i}" onclick="selectChapter(${i})" style="padding:10px 16px;cursor:pointer;border-radius:8px;transition:background .15s;font-size:14px;color:${i===currentChapter?'#fff':'#888'};background:${i===currentChapter?'#1e1e3a':'transparent'};margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${num}. ${ch.title.substring(0,25)}</div>`;
  });

  panel.innerHTML=`
  <div style="display:flex;gap:16px;align-items:flex-start">
    <div id="chapterSidebar" style="width:260px;flex-shrink:0;position:sticky;top:64px;max-height:calc(100vh - 80px);overflow-y:auto;background:#0d0d1a;border-radius:12px;border:1px solid #1e1e3a;padding:8px" class="desktop-sidebar">
      <div style="padding:8px 16px;font-size:14px;font-weight:600;color:#8b5cf6;margin-bottom:4px">目录 (${chaptersData.length}章)</div>
      ${listHtml}
    </div>
    <div id="mobileDropdown" style="display:none;width:100%;margin-bottom:16px">
      <select id="chapterSelect" onchange="selectChapter(+this.value)" style="width:100%;padding:12px;background:#111128;color:#d4d4d4;border:1px solid #1e1e3a;border-radius:8px;font-size:15px;font-family:serif">
        ${chaptersData.map((ch,i)=>`<option value="${i}" ${i===currentChapter?'selected':''}>${i+1}. ${ch.title.substring(0,30)}</option>`).join('')}
      </select>
    </div>
    <div style="flex:1;min-width:0">
      <div id="chapterDisplay"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding:0 16px;flex-wrap:wrap;gap:8px" id="chapterNav"></div>
    </div>
  </div>`;
  selectChapter(currentChapter);
  updateSidebarVisibility();
  window.addEventListener('resize',updateSidebarVisibility);
}

function updateSidebarVisibility(){
  const sidebar=document.getElementById('chapterSidebar');
  const dropdown=document.getElementById('mobileDropdown');
  if(!sidebar||!dropdown)return;
  if(window.innerWidth<768){
    sidebar.style.display='none';
    dropdown.style.display='block';
  }else{
    sidebar.style.display='block';
    dropdown.style.display='none';
  }
}

function selectChapter(idx){
  currentChapter=idx;
  const ch=chaptersData[idx];
  if(!ch)return;
  const display=document.getElementById('chapterDisplay');
  const num=idx+1;
  const paragraphs=ch.content.split('\n').filter(p=>p.trim());
  let contentHtml='<div class="chapter-content">';
  contentHtml+=`<h1 style="font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;text-indent:0;font-family:serif;text-align:center">第${num}章 ${ch.title}</h1>`;
  contentHtml+=`<div style="text-align:center;margin-bottom:24px"><button class="copy-btn" onclick="copyChapter(${idx})" id="copyBtn${idx}">📋 复制本章</button> <button class="copy-btn" onclick="copyAllChapters()">📄 复制全文</button></div>`;
  for(const p of paragraphs){
    if(p.startsWith('第')&&p.includes('章')){
      contentHtml+=`<p style="text-indent:0;color:#8b5cf6;font-weight:600;font-size:19px;margin-bottom:16px;text-align:center">${p}</p>`;
    }else{
      contentHtml+=`<p>${p}</p>`;
    }
  }
  contentHtml+='</div>';
  display.innerHTML=contentHtml;

  const nav=document.getElementById('chapterNav');
  nav.innerHTML=`
    <button class="chapter-nav-btn" onclick="selectChapter(${idx-1})" ${idx<=0?'disabled':''}>← 上一章</button>
    <span style="color:#555;font-size:13px;line-height:36px">${num} / ${chaptersData.length}</span>
    <button class="chapter-nav-btn" onclick="selectChapter(${idx+1})" ${idx>=chaptersData.length-1?'disabled':''}>下一章 →</button>`;

  document.querySelectorAll('.chapter-item').forEach(el=>{
    const i=+el.dataset.idx;
    el.style.color=i===idx?'#fff':'#888';
    el.style.background=i===idx?'#1e1e3a':'transparent';
  });

  const sel=document.getElementById('chapterSelect');
  if(sel)sel.value=idx;

  display.scrollIntoView({behavior:'smooth',block:'start'});
}

function copyChapter(idx){
  const ch=chaptersData[idx];
  if(!ch)return;
  const num=idx+1;
  const text=`第${num}章 ${ch.title}\n\n${ch.content.replace(/^第[一二三四五六七八九十]+章.*\n*/,'')}`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyBtn'+idx);
    if(btn){btn.textContent='✅ 已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 复制本章';btn.classList.remove('copied')},2000)}
  });
}

function copyAllChapters(){
  let text='人间仍存\n\n';
  chaptersData.forEach((ch,i)=>{
    text+=`第${i+1}章 ${ch.title}\n\n${ch.content.replace(/^第[一二三四五六七八九十]+章.*\n*/,'')}\n\n${'═'.repeat(30)}\n\n`;
  });
  navigator.clipboard.writeText(text).then(()=>{
    const btns=document.querySelectorAll('.copy-btn');
    btns.forEach(b=>{if(b.textContent.includes('全文')){b.textContent='✅ 已复制';b.classList.add('copied');setTimeout(()=>{b.textContent='📄 复制全文';b.classList.remove('copied')},2000)}});
  });
}

function renderCharacters(){
  const panel=document.getElementById('panel-characters');
  if(!analysisData.characters){panel.innerHTML='<p style="color:#666;padding:20px">暂无人物数据</p>';return;}
  let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">';
  for(const c of analysisData.characters){
    html+=`<div class="card" style="border-left:3px solid ${c.color}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="width:42px;height:42px;border-radius:50%;background:${c.color}22;border:2px solid ${c.color};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:${c.color};flex-shrink:0">${c.name[0]}</div>
        <div>
          <div style="font-size:17px;font-weight:700;color:#fff">${c.name}</div>
          <div style="font-size:12px;color:${c.color}">${c.role||''}</div>
        </div>
      </div>
      <div style="font-size:14px;color:#aaa;line-height:1.7;margin-bottom:10px">${c.desc||''}</div>
      ${c.quote?`<div style="font-size:13px;color:#666;font-style:italic;border-left:2px solid ${c.color}44;padding-left:10px;margin-top:8px">"${c.quote}"</div>`:''}
    </div>`;
  }
  html+='</div>';
  panel.innerHTML=html;
}

function renderRelations(){
  const panel=document.getElementById('panel-relations');
  if(!analysisData.relationships){panel.innerHTML='<p style="color:#666;padding:20px">暂无关系数据</p>';return;}
  const charMap={};
  analysisData.characters.forEach(c=>charMap[c.name]=c);
  let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">';
  for(const r of analysisData.relationships){
    const fromC=charMap[r.from]||{color:'#666'};
    const toC=charMap[r.to]||{color:'#666'};
    const strengthBar='█'.repeat(r.strength||1)+'░'.repeat(5-(r.strength||1));
    html+=`<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-weight:700;color:${fromC.color}">${r.from}</span>
        <span style="font-size:12px;padding:3px 10px;background:#1e1e3a;border-radius:20px;color:#aaa">${r.label}</span>
        <span style="font-weight:700;color:${toC.color}">${r.to}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;height:2px;background:linear-gradient(90deg,${fromC.color},${toC.color});border-radius:1px"></div>
      </div>
      <div style="margin-top:8px;font-size:12px;color:#555">强度: <span style="color:#8b5cf6;font-family:monospace">${strengthBar}</span></div>
      ${r.type?`<div style="margin-top:4px;font-size:11px;color:#444">类型: ${r.type}</div>`:''}
    </div>`;
  }
  html+='</div>';
  panel.innerHTML=html;
}

function renderWorld(){
  const panel=document.getElementById('panel-world');
  const ws=analysisData.worldSettings;
  if(!ws||!ws.length){panel.innerHTML='<p style="color:#666;padding:20px">暂无世界观数据</p>';return;}
  const typeColors={'机构':'#8b5cf6','部门':'#3498db','上级':'#e74c3c','灰色势力':'#666','地下组织':'#2ecc71','地点':'#f39c12','宇宙常数':'#e74c3c','核心机制':'#e67e22','干涉界面':'#9b59b6','历史势力':'#1abc9c','终极事件':'#c0392b','核心设定':'#8b5cf6','经济体系':'#f1c40f','白忘原机制':'#1abc9c','死账荒白':'#c0392b','碎卷海机制':'#3498db','铁锈工坊暗线':'#e67e22'};
  let html='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">';
  for(const w of ws){
    const c=typeColors[w.type]||'#8b5cf6';
    html+=`<div class="card world-card" style="border-left-color:${c}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:17px;font-weight:700;color:#fff">${w.name}</span>
        <span style="font-size:11px;padding:2px 8px;background:${c}22;color:${c};border-radius:12px">${w.type}</span>
      </div>
      <div style="font-size:14px;color:#aaa;line-height:1.7">${w.desc}</div>
    </div>`;
  }
  html+='</div>';
  panel.innerHTML=html;
}

function renderOutline(){
  const panel=document.getElementById('panel-outline');
  // 找结构文档（标题含"结构"或"v9"的第一章）
  const structure=chaptersData.find(c=>c.title.includes('结构')||c.title.includes('v9')||c.title.includes('优化'));
  if(!structure){panel.innerHTML='<p style="color:#666">无大纲数据</p>';return;}
  const paragraphs=structure.content.split('\n').filter(p=>p.trim());
  let html='<div class="outline-content"><h2 style="font-size:22px;font-weight:700;color:#8b5cf6;margin-bottom:24px;text-align:center">📋 结构文档 · 大纲</h2>';
  for(const p of paragraphs){
    if(p.startsWith('第')&&p.includes('章')){
      html+=`<h3 style="font-size:17px;font-weight:700;color:#e67e22;margin:24px 0 12px;padding-left:8px;border-left:3px solid #e67e22">${p}</h3>`;
    }else if(p.startsWith('#')){
      html+=`<h3 style="font-size:18px;font-weight:700;color:#fff;margin:20px 0 10px">${p.replace(/^#+\s*/,'')}</h3>`;
    }else if(p.startsWith('---')){
      html+=`<hr style="border:none;border-top:1px solid #1e1e3a;margin:20px 0">`;
    }else if(p.length<30&&(p.includes('：')||p.includes(':'))){
      html+=`<p style="font-weight:600;color:#d4d4d4;text-indent:0">${p}</p>`;
    }else{
      html+=`<p>${p}</p>`;
    }
  }
  html+='</div>';
  panel.innerHTML=html;
}

function renderPatches(){
  const panel=document.getElementById('panel-patches');
  const notes=analysisData.notes;
  const timeline=analysisData.timeline;
  let html='';

  if(timeline&&timeline.length){
    html+=`<div class="card" style="margin-bottom:24px">
      <div style="font-size:16px;font-weight:600;color:#fff;margin-bottom:16px">⏱️ 时间线</div>
      <div style="position:relative;padding-left:24px">`;
    for(let i=0;i<timeline.length;i++){
      const t=timeline[i];
      const colors={turning:'#e74c3c',discovery:'#2ecc71',character:'#3498db',crisis:'#f39c12'};
      const tc=colors[t.type]||'#8b5cf6';
      html+=`<div style="position:relative;padding-bottom:20px;border-left:2px solid #1e1e3a;padding-left:20px;margin-left:0">
        <div style="position:absolute;left:-7px;top:2px;width:12px;height:12px;border-radius:50%;background:${tc};border:2px solid #0a0a0f"></div>
        <div style="font-size:12px;color:${tc};margin-bottom:2px">${t.time||t.chapter||''} ${t.type?'· '+t.type:''}</div>
        <div style="font-size:14px;color:#d4d4d4">${t.event}</div>
      </div>`;
    }
    html+='</div></div>';
  }

  if(!notes||!notes.length){
    html+=`<div class="card">
      <div style="font-size:16px;font-weight:600;color:#fff;margin-bottom:12px">🔧 补丁集</div>
      <div style="color:#555;font-size:14px;padding:20px;text-align:center">暂无补丁记录</div>
    </div>`;
  }else{
    html+=`<div class="card">
      <div style="font-size:16px;font-weight:600;color:#fff;margin-bottom:12px">🔧 补丁集</div>
      <div style="font-size:14px;color:#aaa;line-height:1.8">${notes.map(n=>`<div style="padding:8px 0;border-bottom:1px solid #1e1e3a">${typeof n==='string'?n:JSON.stringify(n)}</div>`).join('')}</div>
    </div>`;
  }
  panel.innerHTML=html;
}

document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',function(){
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    const panel=document.getElementById('panel-'+this.dataset.tab);
    if(panel)panel.classList.add('active');
    if(this.dataset.tab==='chapters')updateSidebarVisibility();
  });
});

loadData();
</script>
</body>
</html>
