</div>

<script>
const STORAGE_KEY='renjian-reader-v3';
const defaultReaderState={chapter:0,activeTab:'overview',fontSize:18,fontFamily:'song',plain:false,readChapters:[],seconds:0,lastScroll:0};
function loadReaderState(){try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||localStorage.getItem('renjian-reader-v2')||'{}');return Object.assign({},defaultReaderState,saved,{readChapters:Array.isArray(saved.readChapters)?saved.readChapters:[]})}catch(error){console.warn('阅读记录损坏，已使用默认设置',error);return {...defaultReaderState}}}
const readerState=loadReaderState();
let chaptersData=[],contentData={},analysisData={},outlineText='',patchDocuments=[],currentChapter=readerState.chapter||0,chartInstance=null,activeTab='overview',sessionStarted=Date.now(),searchSelection=0;

async function loadData(){
  try{
    const urls=['data/chapters.json','data/content.json','data/analysis.json','_source/outline_v12.txt','_source/setting_correction.md','_source/setting_corrections_0619.md','_source/setting_mechanics.md'];
    const responses=await Promise.all(urls.map(url=>fetch(url)));
    responses.forEach((response,index)=>{if(!response.ok)throw new Error(`${urls[index]}: HTTP ${response.status}`)});
    const [chapters,content,analysis,outline,...patches]=await Promise.all([
      responses[0].json(),responses[1].json(),responses[2].json(),responses[3].text(),
      responses[4].text(),responses[5].text(),responses[6].text()
    ]);
    chaptersData=chapters;
    contentData=content;
    analysisData=analysis;
    outlineText=outline;
    patchDocuments=[
      {title:'设定修正 · 账 = 历史',content:patches[0]},
      {title:'设定修正记录 · 06/19',content:patches[1]},
      {title:'能力机制铁律',content:patches[2]}
    ];
    renderAll();
  }catch(error){
    console.error('数据加载失败',error);
    document.getElementById('panel-overview').innerHTML=`<div class="load-error">数据加载失败：${escapeHtml(error.message)}。请通过 HTTP 服务器打开本站，而不是直接打开本地文件。</div>`;
  }
}

function escapeHtml(value){
  return String(value).replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
}

function inlineMarkdown(value){
  return escapeHtml(value).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code style="color:#c49b72">$1</code>');
}

function renderDocument(text){
  const lines=text.replace(/\r/g,'').split('\n');
  let html='',inList=false;
  const closeList=()=>{if(inList){html+='</ul>';inList=false}};
  for(const raw of lines){
    const line=raw.trim();
    if(!line){closeList();continue}
    if(/^[-—═]{3,}$/.test(line)){closeList();html+='<hr>';continue}
    const heading=line.match(/^(#{1,3})\s+(.+)$/);
    if(heading){closeList();const level=heading[1].length;html+=`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`;continue}
    if(/^【.+】$/.test(line)){closeList();html+=`<h2>${inlineMarkdown(line.slice(1,-1))}</h2>`;continue}
    if(/^[-*]\s+/.test(line)){if(!inList){html+='<ul>';inList=true}html+=`<li>${inlineMarkdown(line.replace(/^[-*]\s+/,''))}</li>`;continue}
    closeList();
    if(/^第[一二三四五六七八九十百零\d]+(章|部分|组)/.test(line)||/^[一二三四五六七八九十]+、/.test(line)){
      html+=`<h3>${inlineMarkdown(line)}</h3>`;
    }else{
      html+=`<p>${inlineMarkdown(line)}</p>`;
    }
  }
  closeList();
  return html;
}

function renderAll(){
  renderOverview();
  renderChapters();
  renderCharacters();
  renderRelations();
  renderWorld();
  renderOutline();
  renderPatches();
  applyReaderPreferences();
  renderTerms();
  restoreLocation();
}

function renderOverview(){
  const panel=document.getElementById('panel-overview');
  const totalChars=contentData.stats?.totalChars??chaptersData.reduce((s,c)=>s+c.chars_with_punct,0);
  const chapterCount=contentData.stats?.totalChapters??chaptersData.length;
  const avgChars=Math.round(totalChars/chapterCount);
  const charCount=analysisData.characters?analysisData.characters.length:0;

  let html=`
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px">
    <div class="stat-card"><div style="font-size:32px;font-weight:bold;color:#b76048">${chapterCount}</div><div style="font-size:13px;color:#888;margin-top:4px">总章数</div></div>
    <div class="stat-card"><div style="font-size:32px;font-weight:bold;color:#3498db">${totalChars.toLocaleString()}</div><div style="font-size:13px;color:#888;margin-top:4px">总字数(含标点)</div></div>
    <div class="stat-card"><div style="font-size:32px;font-weight:bold;color:#2ecc71">${avgChars.toLocaleString()}</div><div style="font-size:13px;color:#888;margin-top:4px">平均每章字数</div></div>

  panel.innerHTML=html;

function renderHeatmap(){
  const container=document.getElementById('heatmapContainer');
  if(!analysisData.characters||!container)return;
  const coreChars=analysisData.characters.filter(c=>['陈亦','陆执灯','曹留','谢观成','罗小满','老孟','杜衡','沈怀'].includes(c.name));
  const chapterCount=chaptersData.length;
  let html='<div style="display:flex;gap:4px;margin-bottom:8px;padding-left:90px">';
  for(let i=1;i<=chapterCount;i++){
    html+='<div style="width:14px;text-align:center;font-size:9px;color:#555">'+i+'</div>';
  }
  html+='</div>';
  for(const ch of coreChars){
    html+='<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">';
    html+='<div style="width:82px;text-align:right;font-size:12px;color:'+ch.color+';flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ch.name+'</div>';
    for(let i=0;i<chaptersData.length;i++){
      const content=chaptersData[i].content||'';
      const count=(content.match(new RegExp(ch.name,'g'))||[]).length;
      const intensity=Math.min(count/5,1);
      const bg=intensity===0?'#1a1a2e':`rgba(${parseInt(ch.color.slice(1,3),16)},${parseInt(ch.color.slice(3,5),16)},${parseInt(ch.color.slice(5,7),16)},${0.2+intensity*0.8})`;
      html+='<div class="heatmap-cell" style="background:'+bg+'" title="'+ch.name+' 第'+(i+1)+'章: '+count+'次"></div>';
    }
    html+='</div>';
  }
  container.innerHTML=html;
}

function updateSidebarVisibility(){

function selectChapter(idx,preserveScroll=false){
  idx=Math.max(0,Math.min(chaptersData.length-1,Number(idx)||0));
  currentChapter=idx;
  const ch=chaptersData[idx];
  if(!ch)return;
  const display=document.getElementById('chapterDisplay');
  const num=idx+1;
  const body=stripChapterHeading(ch.content);
  const paragraphs=body.split('\n').filter(p=>p.trim());
  let contentHtml='<div class="chapter-content">';
  contentHtml+=`<h1 style="font-size:22px;font-weight:700;color:#fff;margin-bottom:8px;text-indent:0;font-family:serif;text-align:center">第${num}章 ${ch.title}</h1>`;
  const chars=ch.chars_with_punct||body.length;
  const minutes=Math.max(1,Math.ceil(chars/450));
  contentHtml+=`<div class="reader-meta"><span>${chars.toLocaleString()} 字</span><span>约 ${minutes} 分钟</span><span>第 ${num} / ${chaptersData.length} 章</span></div>`;
  contentHtml+=`<div class="reader-actions" style="text-align:center;margin-bottom:24px"><button class="copy-btn" onclick="copyChapter(${idx})" id="copyBtn${idx}">复制本章</button> <button class="copy-btn" onclick="copyAllChapters()">复制全文</button></div>`;
  for(const p of paragraphs){
    if(p.startsWith('第')&&p.includes('章')){
      contentHtml+=`<p style="text-indent:0;color:#b76048;font-weight:600;font-size:19px;margin-bottom:16px;text-align:center">${escapeHtml(p)}</p>`;
    }else{
      contentHtml+=`<p>${escapeHtml(p)}</p>`;
    }
  }
  contentHtml+='</div>';
  contentHtml+=renderHumanChain(idx);
  display.innerHTML=contentHtml;

  const nav=document.getElementById('chapterNav');
  nav.innerHTML=`
    <button class="chapter-nav-btn" onclick="selectChapter(${idx-1})" ${idx<=0?'disabled':''}>← 上一章</button>
    <span style="color:#555;font-size:13px;line-height:36px">${num} / ${chaptersData.length}</span>
    <button class="chapter-nav-btn" onclick="selectChapter(${idx+1})" ${idx>=chaptersData.length-1?'disabled':''}>下一章 →</button>`;

  document.querySelectorAll('.chapter-item').forEach(el=>{
    const i=+el.dataset.idx;
    el.style.color=i===idx?'#fff':'#888';
    el.style.background=i===idx?'#1e1e3a':'transparent';
  });

  const sel=document.getElementById('chapterSelect');
  if(sel)sel.value=idx;
  readerState.chapter=idx;
  if(!readerState.readChapters.includes(idx))readerState.readChapters.push(idx);
  if(!preserveScroll)readerState.lastScroll=0;
  saveReaderState();
  applyReaderPreferences();
  if(activeTab==='chapters')display.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderHumanChain(idx){
  const chains=[
    {chapter:5,title:'无声的拥抱'},{chapter:18,title:'最后的一根烟'},{chapter:40,title:'雨中的伞'},{chapter:88,title:'名字的刻痕'},
    {chapter:95,title:'假账里的真话'},{chapter:130,title:'断手的传递'},{chapter:145,title:'盲人的眼'},{chapter:160,title:'面摊'},{chapter:170,title:'遗书朗读'},{chapter:180,title:'消失的合影'}
  ];
  const reached=chains.filter(item=>item.chapter<=idx+1).length;
  const next=chains[reached];
  return `<aside class="chain-panel"><div style="display:flex;justify-content:space-between;gap:12px"><div><div style="color:#c49b72;font-weight:700">人间链 · ${reached}/10</div><div style="color:#777;font-size:12px;margin-top:4px">${next?`下一锚点：第${next.chapter}章 · ${next.title}`:'十链已成，人间仍存'}</div></div><div style="color:#745044;font-size:24px">链</div></div><div class="chain-track">${chains.map((item,i)=>`<span class="chain-node ${i<reached?'done':''} ${item.chapter===idx+1?'current':''}" title="第${item.chapter}章 · ${item.title}"></span>`).join('')}</div></aside>`;
}

function stripChapterHeading(content){
  return content.replace(/^\s*#*\s*第[一二三四五六七八九十百零\d]+章[^\n]*\n*/,'');
}

function copyChapter(idx){
  const ch=chaptersData[idx];
  if(!ch)return;
  const num=idx+1;
  const text=`第${num}章 ${ch.title}\n\n${stripChapterHeading(ch.content)}`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyBtn'+idx);
    if(btn){btn.textContent='✅ 已复制';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 复制本章';btn.classList.remove('copied')},2000)}
  });
}

function copyAllChapters(){
  let text='人间仍存\n\n';
  chaptersData.forEach((ch,i)=>{
    text+=`第${i+1}章 ${ch.title}\n\n${stripChapterHeading(ch.content)}\n\n${'═'.repeat(30)}\n\n`;
  });
  navigator.clipboard.writeText(text).then(()=>{
    const btns=document.querySelectorAll('.copy-btn');
    btns.forEach(b=>{if(b.textContent.includes('全文')){b.textContent='✅ 已复制';b.classList.add('copied');setTimeout(()=>{b.textContent='📄 复制全文';b.classList.remove('copied')},2000)}});
  });
}

function switchTab(name){
  activeTab=name;
  readerState.activeTab=name;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+name));
  document.querySelectorAll('.bottom-btn[data-mobile-tab]').forEach(b=>b.classList.toggle('active',b.dataset.mobileTab===name));
  if(name==='chapters')updateSidebarVisibility();
  saveReaderState();
  window.scrollTo({top:0,behavior:'smooth'});
}
document.querySelectorAll('.nav-tab').forEach(tab=>tab.addEventListener('click',()=>switchTab(tab.dataset.tab)));
document.querySelectorAll('.bottom-btn[data-mobile-tab]').forEach(btn=>btn.addEventListener('click',()=>switchTab(btn.dataset.mobileTab)));

function saveReaderState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(readerState))}catch(error){console.warn('无法保存阅读记录',error)}}
function formatDuration(seconds){const mins=Math.floor((seconds||0)/60);return mins<60?`${mins} 分钟`:`${Math.floor(mins/60)}时${mins%60}分`}
function applyReaderPreferences(){
  document.documentElement.style.setProperty('--reader-size',readerState.fontSize+'px');
  document.querySelectorAll('.chapter-content').forEach(el=>{el.style.fontSize=readerState.fontSize+'px';el.style.fontFamily=readerState.fontFamily==='wenkai'?`"LXGW WenKai","霞鹜文楷",serif`:`"Noto Serif SC","Source Han Serif SC",serif`});
  document.body.classList.toggle('plain-reading',!!readerState.plain);
  const btn=document.getElementById('plainModeBtn');if(btn)btn.classList.toggle('active',!!readerState.plain);
}
function setFontSize(value){readerState.fontSize=Number(value);applyReaderPreferences();saveReaderState()}
function adjustFontSize(delta){const next=Math.max(15,Math.min(26,readerState.fontSize+delta));setFontSize(next);const range=document.getElementById('fontSizeRange');if(range)range.value=next;showToast(`正文字号 ${next}px`)}
function setFontFamily(value){readerState.fontFamily=value;applyReaderPreferences();saveReaderState()}
function togglePlainMode(){readerState.plain=!readerState.plain;applyReaderPreferences();saveReaderState();showToast(readerState.plain?'已进入纯文本阅读，按 Esc 返回':'已退出阅读模式')}
function previousChapter(){if(!chaptersData.length)return;switchTab('chapters');selectChapter(currentChapter-1)}
function nextChapter(){if(!chaptersData.length)return;switchTab('chapters');selectChapter(currentChapter+1)}
async function toggleFullscreen(){try{if(!document.fullscreenElement)await document.documentElement.requestFullscreen();else await document.exitFullscreen()}catch(e){showToast('当前浏览器不支持全屏')}}

function updateReadingProgress(){
  let percent=0;
  if(activeTab==='chapters'){
    const content=document.querySelector('#chapterDisplay .chapter-content');
    if(content){const rect=content.getBoundingClientRect(),travel=Math.max(1,content.offsetHeight-window.innerHeight);percent=Math.max(0,Math.min(1,-rect.top/travel));readerState.lastScroll=percent}
  }else{const max=document.documentElement.scrollHeight-window.innerHeight;percent=max>0?window.scrollY/max:0}
  document.getElementById('readingProgress').style.width=(percent*100)+'%';
}
let scrollSaveTimer;
window.addEventListener('scroll',()=>{updateReadingProgress();clearTimeout(scrollSaveTimer);scrollSaveTimer=setTimeout(saveReaderState,250)},{passive:true});

function openSearch(){closeModals();const modal=document.getElementById('searchModal');modal.classList.add('open');const input=document.getElementById('searchInput');input.value='';renderSearchResults('');setTimeout(()=>input.focus(),20)}
function renderSearchResults(query){
  const q=query.trim().toLowerCase();
  const results=chaptersData.map((ch,i)=>({ch,i,text:stripChapterHeading(ch.content).replace(/\s+/g,' ')})).filter(x=>!q||x.ch.title.toLowerCase().includes(q)||x.text.toLowerCase().includes(q)).slice(0,30);
  searchSelection=0;
  document.getElementById('searchResults').innerHTML=results.length?results.map((x,n)=>{const pos=q?x.text.toLowerCase().indexOf(q):-1;const snippet=pos>=0?x.text.slice(Math.max(0,pos-28),pos+q.length+48):x.text.slice(0,75);return `<div class="search-result ${n===0?'selected':''}" data-search-idx="${x.i}" onclick="goSearchResult(${x.i})"><div style="color:#eee">第${x.i+1}章 · ${highlight(x.ch.title,q)}</div><div class="search-snippet">${highlight(snippet,q)}</div></div>`}).join(''):'<div style="padding:24px;text-align:center;color:#666">没有找到相关章节</div>';
}
function highlight(text,q){const safe=escapeHtml(text);if(!q)return safe;const escaped=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return safe.replace(new RegExp(escaped,'ig'),m=>`<mark>${m}</mark>`)}
function goSearchResult(idx){closeModals();switchTab('chapters');selectChapter(idx)}
function moveSearchSelection(delta){const results=[...document.querySelectorAll('#searchResults .search-result')];if(!results.length)return;searchSelection=(searchSelection+delta+results.length)%results.length;results.forEach((el,i)=>el.classList.toggle('selected',i===searchSelection));results[searchSelection].scrollIntoView({block:'nearest'})}

const fallbackTerms=[
  ['账','记录即存在，历史本身的运作方式。'],['账位','一个人在历史中的位置；结算成果记在账位上。'],['结算','超额结果成立后，成果、能力与代价同时落下。'],['墨未干','追溯被改写之物的能力，代价是存在感持续被稀释。'],['补痕','续接被截断的账，但续接出的未必是原物。'],['候','墨未干的第三态，将暂时无法处理的债务悬置。'],['楔','冻结结算、阻止真账落笔的做假账手段。'],['排异','能力异物对身体、身份与存在造成的持续排斥。'],['清障小账','水衡司处理异常的小型结算流程，已成事实不可逆。'],['死法残免','绝墨发力后，从一次失败死法中留下的残缺豁免。']
];
function getTerms(){
  const world=(analysisData.worldSettings||[]).flatMap(w=>{const items=[[w.name,w.desc]];for(const part of String(w.desc).split(/\s+/)){const m=part.match(/^([^：:]{1,12})[：:]{1,2}(.+)/);if(m)items.push([m[1],m[2]])}return items});
  const map=new Map([...fallbackTerms,...world]);return [...map].map(([name,desc])=>({name,desc}));
}
function openTerms(){closeModals();document.getElementById('termsModal').classList.add('open');const input=document.getElementById('termInput');input.value='';renderTerms('');setTimeout(()=>input.focus(),20)}
function openShortcuts(){closeModals();document.getElementById('shortcutsModal').classList.add('open')}
function renderTerms(query=''){const host=document.getElementById('termResults');if(!host)return;const q=query.trim().toLowerCase();host.innerHTML=getTerms().filter(t=>!q||t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)).map(t=>`<div class="term-row"><div class="term-name">${escapeHtml(t.name)}</div><div class="term-desc">${escapeHtml(t.desc).replace(/：：/g,'：')}</div></div>`).join('')}
function closeModals(){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('open'))}
function closeOnBackdrop(e){if(e.target.classList.contains('modal'))closeModals()}
function showToast(message){const el=document.getElementById('toast');el.textContent=message;el.classList.add('show');clearTimeout(el.timer);el.timer=setTimeout(()=>el.classList.remove('show'),1800)}

document.getElementById('searchInput').addEventListener('input',e=>renderSearchResults(e.target.value));
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='ArrowDown'){e.preventDefault();moveSearchSelection(1)}else if(e.key==='ArrowUp'){e.preventDefault();moveSearchSelection(-1)}else if(e.key==='Enter'){e.preventDefault();const selected=document.querySelector('#searchResults .search-result.selected');if(selected)goSearchResult(+selected.dataset.searchIdx)}});
document.getElementById('termInput').addEventListener('input',e=>renderTerms(e.target.value));
document.addEventListener('keydown',e=>{
  const typing=['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openSearch();return}
  if(e.key==='Escape'){if(document.querySelector('.modal.open'))closeModals();else if(readerState.plain)togglePlainMode();else if(activeTab==='chapters')switchTab('overview');return}
  if(typing)return;
  if(e.key==='ArrowLeft'){e.preventDefault();previousChapter()}
  if(e.key==='ArrowRight'){e.preventDefault();nextChapter()}
  if(e.key.toLowerCase()==='f'){e.preventDefault();toggleFullscreen()}
  if(e.key.toLowerCase()==='r'){e.preventDefault();if(activeTab!=='chapters')switchTab('chapters');togglePlainMode()}
  if(e.key.toLowerCase()==='t'){e.preventDefault();openTerms()}
  if(e.key==='?'||e.key==='/'){e.preventDefault();openShortcuts()}
  if(e.key==='+'||e.key==='='){e.preventDefault();adjustFontSize(1)}
  if(e.key==='-'||e.key==='_'){e.preventDefault();adjustFontSize(-1)}
});

let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX;touchStartY=e.changedTouches[0].screenY},{passive:true});
document.addEventListener('touchend',e=>{if(activeTab!=='chapters'||document.querySelector('.modal.open'))return;const dx=e.changedTouches[0].screenX-touchStartX,dy=e.changedTouches[0].screenY-touchStartY;if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.4){dx<0?nextChapter():previousChapter()}},{passive:true});

function restoreLocation(){const savedChapter=Math.max(0,Math.min(readerState.chapter,chaptersData.length-1)),savedScroll=Number(readerState.lastScroll)||0,savedTab=readerState.activeTab||'overview';currentChapter=savedChapter;switchTab(savedTab);if(savedTab==='chapters'){selectChapter(savedChapter,true);readerState.lastScroll=savedScroll;setTimeout(()=>{const content=document.querySelector('#chapterDisplay .chapter-content');if(content&&savedScroll){const travel=Math.max(1,content.offsetHeight-window.innerHeight);window.scrollTo({top:content.offsetTop+travel*savedScroll,behavior:'auto'});updateReadingProgress()}},150)}}
setInterval(()=>{if(!document.hidden&&activeTab==='chapters'){readerState.seconds+=15;saveReaderState()}},15000);
document.addEventListener('visibilitychange',()=>{if(document.hidden)saveReaderState()});
window.addEventListener('beforeunload',saveReaderState);
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

loadData();
</script>
